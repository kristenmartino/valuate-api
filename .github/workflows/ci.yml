name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: runtime.txt  # 3.11.10
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # The network-marked integration test against AAPL is skipped here
      # (pytest.ini's addopts = -m "not network"). It's intended to run on
      # a Railway cron, not in CI — CI shouldn't depend on the SEC API or
      # the Anthropic API being reachable.
      - name: Run unit + auth/rate-limit tests
        run: pytest tests/ -v
