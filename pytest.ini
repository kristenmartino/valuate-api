[pytest]
# Skip tests marked `network` by default — they make real outbound calls to
# SEC EDGAR and so are unsuitable for CI without `SEC_USER_AGENT` set. Run
# them explicitly with `-m network` (or `-m ""` to ignore the filter).
addopts = -m "not network"

# Markers used in tests. Registering them here silences pytest's
# "unknown marker" warning and documents what each one means.
markers =
    network: tests that make real network calls (skipped by default; opt in with `-m network`)
